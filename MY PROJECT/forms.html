<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first website</title>
</head>
<body>
    <form action="action_page.php" method="POST">  <!--Do not use get when keeping crucial details like passport information. Better to use POST-->
        <label for="fname">first name</label>
        <input type="text" id="fname" name="fname" placeholder="Calvin">

        <label for="last name">last name</label>
        <input type="text" id="last name" name="last name" placeholder="Calvin">

        <label for="email">email</label>
        <input type="email" id="email" name="email" placeholder="david@gmail.com">

        <label for="password">password</label>
        <input type="password" id="pass" name="pass" maxlength="12" required>

        <div>
            <input type="reset">
        </div>

        <div>
            <input type="submit">
        </div>

    </form>
</body>
</html>
